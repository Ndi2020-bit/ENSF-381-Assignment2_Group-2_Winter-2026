    <script> //ADDED JS
    const container = document.getElementById("order_summary_container");

const toppings = localStorage.getItem("toppings") || "--";
const total = parseFloat(localStorage.getItem("total") || 6).toFixed(2);

container.innerHTML = `
  <table>
    <tr><td>Flavor</td><td>${flavor}</td></tr>
    <tr><td>Type</td><td>${base}</td></tr>
    <tr><td>Toppings</td><td>${toppings}</td></tr>
    <tr><td>Price</td><td>$${total}</td></tr>
